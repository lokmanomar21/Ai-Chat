<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSL Talent AI · Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --psl-cyan:       #02bac6;
    --psl-teal:       #49a18c;
    --psl-dark-teal:  #3a6a59;
    --psl-orange:     #f37022;
    --psl-gray-light: #e0e1e0;
    --psl-gray-mid:   #a4acaf;
    --psl-gray-dark:  #6e6e6e;
    --white:          #ffffff;
    --off-white:      #f4faf8;
    --text-dark:      #1c2e28;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--off-white);
    color: var(--text-dark);
  }

  /* ── LAYOUT ── */
  .page {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 760px;
    margin: 0 auto;
    background: white;
    box-shadow: 0 0 60px rgba(58,106,89,0.1);
  }

  /* ── HEADER ── */
  .chat-header {
    background: linear-gradient(135deg, #2a5244, #3a6a59, #49a18c);
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .chat-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 120% at 80% 50%, rgba(2,186,198,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    position: relative; z-index: 1;
  }

  .header-info { flex: 1; position: relative; z-index: 1; }

  .header-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: white;
    letter-spacing: 0.2px;
  }

  .header-sub {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
    animation: statusPulse 2.5s infinite;
  }

  @keyframes statusPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .header-back {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 7px 14px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.2s;
    position: relative; z-index: 1;
    flex-shrink: 0;
  }

  .header-back:hover { background: rgba(255,255,255,0.22); }

  /* ── MESSAGES AREA ── */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .messages-area::-webkit-scrollbar { width: 5px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--psl-gray-light); border-radius: 3px; }

  /* ── DATE DIVIDER ── */
  .date-divider {
    text-align: center;
    font-size: 0.72rem;
    color: var(--psl-gray-mid);
    font-weight: 500;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--psl-gray-light);
  }

  /* ── MESSAGES ── */
  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn 0.22s ease both;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    align-self: flex-end;
  }

  .msg.bot .msg-avatar {
    background: linear-gradient(135deg, var(--psl-teal), var(--psl-dark-teal));
  }

  .msg.user .msg-avatar {
    background: rgba(73,161,140,0.12);
    border: 1px solid rgba(73,161,140,0.2);
  }

  .msg-bubble {
    max-width: 72%;
    padding: 11px 16px;
    border-radius: 18px;
    font-size: 0.88rem;
    line-height: 1.55;
  }

  .msg.bot .msg-bubble {
    background: var(--off-white);
    color: var(--text-dark);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(224,225,224,0.7);
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--psl-teal), var(--psl-dark-teal));
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-bubble a {
    color: var(--psl-teal);
    text-decoration: underline;
  }

  .msg.user .msg-bubble a {
    color: rgba(255,255,255,0.85);
  }

  .msg-time {
    font-size: 0.68rem;
    color: var(--psl-gray-mid);
    align-self: flex-end;
    margin-bottom: 2px;
    flex-shrink: 0;
  }

  /* ── QUICK BUTTONS ── */
  .quick-section {
    padding: 4px 20px 12px;
    flex-shrink: 0;
  }

  .quick-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--psl-gray-mid);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .quick-btn {
    padding: 7px 14px;
    border-radius: 50px;
    border: 1.5px solid rgba(73,161,140,0.35);
    background: white;
    color: var(--psl-dark-teal);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .quick-btn:hover {
    background: linear-gradient(135deg, var(--psl-teal), var(--psl-dark-teal));
    border-color: transparent;
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(73,161,140,0.3);
  }

  /* ── INPUT ROW ── */
  .input-row {
    padding: 12px 16px 16px;
    border-top: 1px solid var(--psl-gray-light);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
    background: white;
  }

  .chat-input {
    flex: 1;
    border: 1.5px solid var(--psl-gray-light);
    border-radius: 50px;
    padding: 11px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    color: var(--text-dark);
    background: var(--off-white);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .chat-input:focus {
    border-color: var(--psl-teal);
    box-shadow: 0 0 0 3px rgba(73,161,140,0.12);
  }

  .chat-input::placeholder { color: var(--psl-gray-mid); }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--psl-teal), var(--psl-dark-teal));
    border: none;
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    transition: all 0.15s;
    box-shadow: 0 3px 12px rgba(73,161,140,0.35);
  }

  .send-btn:hover { transform: scale(1.08); box-shadow: 0 5px 16px rgba(73,161,140,0.45); }
  .send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── TYPING ── */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 12px 16px;
    background: var(--off-white);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(224,225,224,0.7);
    width: fit-content;
  }

  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--psl-teal);
    animation: bounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── FOOTER ── */
  .page-footer {
    background: linear-gradient(135deg, #2a5244, #3a6a59);
    color: rgba(255,255,255,0.55);
    text-align: center;
    padding: 10px 20px;
    font-size: 0.72rem;
    flex-shrink: 0;
  }

  .page-footer a { color: var(--psl-cyan); text-decoration: none; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .msg-bubble { max-width: 85%; }
    .header-back span { display: none; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="header-avatar">🤖</div>
    <div class="header-info">
      <div class="header-name">PSL Talent AI</div>
      <div class="header-sub">
        <span class="status-dot"></span>
        Online · Powered by Claude · PeerHealth Malaysia
      </div>
    </div>
    <a class="header-back" href="psl-search.html">🔍 <span>Search</span></a>
  </div>

  <!-- MESSAGES -->
  <div class="messages-area" id="messagesArea">
    <div class="date-divider">Today</div>
  </div>

  <!-- QUICK BUTTONS -->
  <div class="quick-section" id="quickSection">
    <div class="quick-label">Quick topics</div>
    <div class="quick-btns">
      <button class="quick-btn" onclick="quickAsk('Tell me about leave policies')">🗓 Leave</button>
      <button class="quick-btn" onclick="quickAsk('Medical and insurance benefits')">🏥 Medical</button>
      <button class="quick-btn" onclick="quickAsk('How do I claim expenses?')">🧾 Expenses</button>
      <button class="quick-btn" onclick="quickAsk('Salary and payroll info')">💰 Salary</button>
      <button class="quick-btn" onclick="quickAsk('Who do I contact in HR, Finance, and IT?')">📞 Contacts</button>
      <button class="quick-btn" onclick="quickAsk('Public holidays 2026')">🎉 Public Holidays</button>
    </div>
  </div>

  <!-- INPUT ROW -->
  <div class="input-row">
    <input type="text" class="chat-input" id="chatInput" placeholder="Ask about policies, benefits, leave…" onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
  </div>

  <!-- FOOTER -->
  <div class="page-footer">
    PSL Talent Guide · Malaysia · <a href="mailto:lokman.omar@pslgroup.com">lokman.omar@pslgroup.com</a>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `You are the PSL Talent AI assistant for PSL Group Malaysia (PeerHealth Malaysia Sdn. Bhd.). You help employees with HR policies, benefits, and workplace questions. Be friendly, concise, and professional.

Key knowledge:
- Annual Leave: 18 days/year after probation. Carry forward max 5 days, must use by March 31. Apply via TimeOut: https://www.unitysuite.com/PSL/ASPX/Signin.aspx
- Sick Leave: <2yr=14days, 2–5yr=18days, >5yr=22days. Hospitalisation up to 60 days.
- Maternity: 98 calendar days full pay. Paternity: 7 days after probation.
- Compassionate: 3 days for immediate family death.
- Salary paid on the 28th each month. 13th month pay at end of year.
- Overtime: only for employees earning <RM4,000/month. Normal day=1.5x, rest day=2x, public holiday=3x.
- Internet reimbursement: max RM180/month via Maconomy. Claims must be submitted within 90 days.
- Medical (MiCARE): GP RM2,000/yr, Specialist RM2,500/yr. Hotline: 1800-88-2678. Portal: https://eclaims.micaresvc.com/login.aspx
- Wellness Benefit: RM800/yr for dental, optical, health (includes spouse & children).
- UK Shift Allowance: RM40/day for 4pm–12:30am shift.
- Employee Referral Bonus: RM1,500 (Executive level), RM2,500 (Senior/Tech level).
- Anniversary Awards: RM2,000 (5yr), RM5,000 (10yr), RM6,000 (15/20/25yr+).
- Contacts: HR/Talent=lokman.omar@pslgroup.com, Finance=ben.tan@pslgroup.com, IT=support.pslasia@pslgroup.com
- TimeOut portal: https://www.unitysuite.com/PSL/ASPX/Signin.aspx
- Dougall PSL AI: https://www.dougallpsl.com
- Public Holidays 2026 (16 total): New Year Jan 1, Thaipusam Feb 2, CNY Feb 17–18, Hari Raya Puasa Mar 23, Labour Day May 1, Hari Raya Haji May 27, Agong Birthday Jun 1, Wesak Jun 2, Awal Muharram Jun 17, Maulidur Rasul Aug 25, National Day Aug 31, Malaysia Day Sep 16, Deepavali Nov 9, Sultan Selangor Birthday Dec 11, Christmas Dec 25.

IMPORTANT: Respond in the same language the user writes in (English or Bahasa Malaysia). Keep responses concise and helpful. Format lists neatly. Do not make up information not listed above.`;

let chatHistory = [];

// Show welcome message on load
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    addBotMsg("👋 Hi! I'm the PSL Talent AI. Ask me anything about leave, medical, salary, claims, or any HR policy.\n\nSaya juga boleh membantu dalam Bahasa Malaysia! 😊");
  }, 300);
});

function getTime() {
  return new Date().toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit' });
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatMsg(text) {
  return escHtml(text)
    .replace(/\n/g, '<br>')
    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function addBotMsg(text) {
  const area = document.getElementById('messagesArea');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-bubble">${formatMsg(text)}</div>
    <div class="msg-time">${getTime()}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addUserMsg(text) {
  const area = document.getElementById('messagesArea');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-time">${getTime()}</div>
    <div class="msg-bubble">${escHtml(text)}</div>
    <div class="msg-avatar">👤</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addTyping() {
  const area = document.getElementById('messagesArea');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingMsg';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

function quickAsk(text) {
  document.getElementById('chatInput').value = text;
  document.getElementById('quickSection').style.display = 'none';
  sendMsg();
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addUserMsg(text);
  chatHistory.push({ role: 'user', content: text });

  btn.disabled = true;
  addTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: chatHistory
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.[0]?.text ?? "Sorry, I couldn't process that. Please try again.";
    chatHistory.push({ role: 'assistant', content: reply });
    addBotMsg(reply);
  } catch (err) {
    removeTyping();
    addBotMsg('Sorry, something went wrong. Please try again or contact HR at lokman.omar@pslgroup.com');
  }

  btn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
